<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Điểm Danh - Quét Khuôn Mặt</title>
  
  <script src="face-api-local.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
    h2 { color: #333; }
    .video-container { position: relative; width: 320px; height: 240px; margin: 20px auto; background: #000; border-radius: 10px; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #status { margin: 15px auto; max-width: 400px; font-weight: bold; color: #555; font-size: 16px; line-height: 1.5; }
    .alert-box { padding: 15px; border: 1px dashed red; background: #fff5f5; border-radius: 5px; text-align: left; }
    a { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <h2>📸 Hệ Thống Điểm Danh AI</h2>
  <div id="status">Đang khởi tạo hệ thống mạng AI...</div>

  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <p><a href="register.html">👉 Chuyển sang trang Đăng ký khuôn mặt mới</a></p>

  <script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    
    const GAS_API = "https://script.google.com/macros/s/AKfycbzYeFb2w_0Jn-s1SR1FCatFKo4MUC4Mn3R6D21iT4Lv-N69jSxnHMY8_eI4EIqiOZ-m/exec";
    const MODEL_URL = './face-api.js-master/weights/';
    let faceMatcher = null;

    async function init() {
      // 1. Mở camera ngay lập tức
      startCamera();

      // 2. Kiểm tra thư viện
      if (typeof faceapi === 'undefined') {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi: Trình duyệt chưa kích hoạt được thư viện face-api local. Hãy kiểm tra lại file face-api-local.js!";
        return;
      }

      try {
        statusDiv.style.color = "#555";
        statusDiv.innerText = "Đang tải các cấu trúc mạng AI từ thư mục Local...";
        
        // Cập nhật từ loadFromDisk sang loadFromUri chuẩn Web Browser
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        statusDiv.style.color = "blue";
        statusDiv.innerText = "Mạng AI nội bộ đã nạp xong! Đang tải dữ liệu học sinh từ Sheets...";
        
        await loadStudentsData();
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi nạp mạng AI: " + error.message;
        console.error("Chi tiết lỗi nạp model:", error);
      }
    }

    async function loadStudentsData() {
      try {
        const response = await fetch(`${GAS_API}?action=get_faces`);
        const result = await response.json();
        
        if (result.status === "success" && result.data.length > 0) {
          const labeledDescriptors = result.data.map(item => {
            const descriptors = item.descriptors.map(d => new Float32Array(d));
            return new faceapi.LabeledFaceDescriptors(item.name, descriptors);
          });
          
          faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
          statusDiv.style.color = "green";
          statusDiv.innerText = "Hệ thống đã sẵn sàng. Hãy nhìn thẳng để điểm danh!";
        } else {
          statusDiv.style.color = "orange";
          statusDiv.innerText = "Chưa có dữ liệu học sinh nào. Hãy đi đăng ký trước!";
        }
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Không thể kết nối dữ liệu Sheet: " + error.message;
      }
    }

    function startCamera() {
      const constraints = { audio: false, video: { facingMode: "user", width: 320, height: 240 } };
      navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
          video.srcObject = stream;
          if(!faceMatcher) {
             statusDiv.innerText = "Camera hoạt động. Đang nạp cấu trúc AI...";
          }
          setInterval(recognizeFace, 2000);
        })
        .catch(err => {
          statusDiv.style.color = "red";
          if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
            statusDiv.innerHTML = `
              <div class="alert-box">
                <p>⚠️ <strong>Chưa cấp quyền Camera!</strong></p>
                <p style="font-size: 14px; color: #555; margin:0;">
                  <strong>Cách sửa:</strong> Bấm vào <strong>icon ổ khóa 🔒</strong> trên thanh địa chỉ ➔ Chọn <strong>Cho phép Camera</strong>, sau đó tải lại trang.
                </p>
              </div>`;
          } else {
            statusDiv.innerText = "Lỗi Camera: " + err.message;
          }
        });
    }

    async function recognizeFace() {
      if (!faceMatcher) return;
      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      if (detection) {
        const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
        if (bestMatch.label !== 'unknown') {
          statusDiv.style.color = "green";
          statusDiv.innerText = `🎉 Xin chào: ${bestMatch.label}! Đang ghi nhận...`;
          await sendAttendance(bestMatch.label);
        } else {
          statusDiv.style.color = "orange";
          statusDiv.innerText = "⚠️ Khuôn mặt không khớp với danh sách!";
        }
      }
    }

    async function sendAttendance(name) {
      try {
        await fetch(GAS_API, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'checkin', name: name })
        });
        statusDiv.style.color = "green";
        statusDiv.innerText = `✅ Điểm danh THÀNH CÔNG học sinh: ${name}`;
      } catch (error) {
        console.error("Lỗi gửi điểm danh:", error);
      }
    }

    window.onload = init;
    // Đăng ký Service Worker để kích hoạt tính năng PWA và chạy Offline
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Kích hoạt PWA Offline thành công!', reg.scope))
          .catch(err => console.error('Lỗi đăng ký PWA:', err));
      });
    }
  </script>
</body>
</html>
