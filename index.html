<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Điểm Danh - Quét Khuôn Mặt</title>
  
  <!-- Nhúng thư viện face-api chuẩn trước -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.clean.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
    h2 { color: #333; }
    .video-container { position: relative; width: 320px; height: 240px; margin: 20px auto; background: #000; border-radius: 10px; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    #status { margin: 15px auto; max-width: 400px; font-weight: bold; color: #555; font-size: 16px; line-height: 1.5; }
    .alert-box { padding: 15px; border: 1px dashed red; background: #fff5f5; border-radius: 5px; text-align: left; }
    a { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <h2>📸 Hệ Thống Điểm Danh AI</h2>
  <div id="status">Đang khởi tạo hệ thống mạng AI từ Cloud...</div>

  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <p><a href="register.html">👉 Chuyển sang trang Đăng ký khuôn mặt mới</a></p>

  <script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    
    // -----------------------------------------------------------------
    // CẤU HÌNH: Dán đường dẫn Web App Google Apps Script (/exec) của bạn vào đây
    const GAS_API = "DÁN_LINK_WEB_APP_APPS_SCRIPT_CỦA_BẠN_Ở_ĐÂY";
    // -----------------------------------------------------------------
    
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/cgarciagl/face-api.js@master/weights/';
    let faceMatcher = null;

    async function init() {
      try {
        // Tải các model AI cần thiết
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        statusDiv.innerText = "Đang tải dữ liệu học sinh từ Google Sheets...";
        await loadStudentsData();
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi khởi tạo AI: " + error.message;
      }
    }

    async function loadStudentsData() {
      try {
        const response = await fetch(`${GAS_API}?action=get_faces`);
        const result = await response.json();
        
        if (result.status === "success" && result.data.length > 0) {
          const labeledDescriptors = result.data.map(item => {
            const descriptors = item.descriptors.map(d => new Float32Array(d));
            return new faceapi.LabeledFaceDescriptors(item.name, descriptors);
          });
          
          faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
          statusDiv.innerText = "Mạng AI sẵn sàng. Đang mở camera trước...";
          startCamera();
        } else {
          statusDiv.style.color = "orange";
          statusDiv.innerText = "Chưa có dữ liệu học sinh nào. Hãy đi đăng ký trước!";
        }
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Không thể kết nối dữ liệu: " + error.message;
      }
    }

    function startCamera() {
      const constraints = {
        audio: false,
        video: { facingMode: "user", width: 320, height: 240 } // Dùng camera trước để điểm danh
      };

      navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
          video.srcObject = stream;
          video.play().catch(e => console.error("Lỗi tự động phát video:", e));
          statusDiv.innerText = "Camera hoạt động. Hãy nhìn thẳng để quét...";
          
          // Bắt đầu nhận diện lặp lại sau mỗi 2 giây
          setInterval(recognizeFace, 2000);
        })
        .catch(err => {
          statusDiv.style.color = "red";
          if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
            statusDiv.innerHTML = `
              <div class="alert-box">
                <p>⚠️ <strong>Ứng dụng chưa được cấp quyền mở Camera!</strong></p>
                <p style="font-size: 14px; color: #555; margin:0;">
                  <strong>Cách sửa:</strong> Bấm vào <strong>icon ổ khóa 🔒</strong> (hoặc chữ <strong>aA</strong>) trên thanh địa chỉ ➔ Tìm mục <strong>Quyền/Cài đặt trang web</strong> ➔ Bật <strong>Cho phép Camera</strong>, sau đó F5 tải lại trang.
                </p>
              </div>`;
          } else {
            statusDiv.innerText = "Lỗi thiết bị Camera: " + err.message;
          }
        });
    }

    async function recognizeFace() {
      if (!faceMatcher) return;
      
      const detection = await faceapi.detectSingleFace(video)
        .withFaceLandmarks()
        .withFaceDescriptor();
        
      if (detection) {
        const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
        if (bestMatch.label !== 'unknown') {
          statusDiv.style.color = "green";
          statusDiv.innerText = `🎉 Xin chào: ${bestMatch.label}! Đang ghi nhận điểm danh...`;
          await sendAttendance(bestMatch.label);
        } else {
          statusDiv.style.color = "orange";
          statusDiv.innerText = "⚠️ Khuôn mặt không khớp với danh sách học sinh!";
        }
      }
    }

    async function sendAttendance(name) {
      try {
        const response = await fetch(GAS_API, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'checkin', name: name })
        });
        statusDiv.style.color = "green";
        statusDiv.innerText = `✅ Điểm danh THÀNH CÔNG cho học sinh: ${name}`;
      } catch (error) {
        console.error("Lỗi gửi điểm danh:", error);
      }
    }

    window.onload = init;
  </script>
</body>
</html>
