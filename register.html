<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký Học Sinh Mới</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 20px; background: #f4f4f9; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input, button { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
    button { background: #28a745; color: white; cursor: pointer; font-weight: bold; }
    button:disabled { background: #cccccc; cursor: not-allowed; }
    #video-container { position: relative; margin: 15px auto; width: 320px; height: 240px; background: #000; border-radius: 8px; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .status { color: blue; font-weight: bold; margin: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h2>📝 ĐĂNG KÝ HỌC SINH</h2>
  <input type="text" id="mssv" placeholder="Nhập Mã số học sinh (MSSV)">
  <input type="text" id="hoten" placeholder="Nhập Họ và Tên">
  <input type="text" id="lop" placeholder="Nhập Tên lớp">
  
  <div id="video-container">
    <video id="video" autoplay playsinline></video>
  </div>
  
  <div class="status" id="status">Đang tải cấu trúc mạng AI từ Cloud... Vui lòng đợi</div>
  <button id="btn-register" disabled>Chụp & Đăng Ký</button>
  <p><a href="index.html">Chuyển sang trang Điểm Danh ➔</a></p>
</div>

<script>
  // ⚠️ THAY URL WEB APP GOOGLE APPS SCRIPT CỦA BẠN VÀO ĐÂY
  const GAS_API = "THAY_URL_DEPLOY_GAS_CỦA_BẠN_VÀO_ĐÂY"; 
  
  // Link CDN chứa các file Model AI trực tuyến công cộng
  const MODEL_URL = 'https://cdn.jsdelivr.net/gh/cgarciagl/face-api.js@master/weights/';

  const video = document.getElementById('video');
  const statusDiv = document.getElementById('status');
  const btnRegister = document.getElementById('btn-register');

  // Đăng ký Service Worker cho PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // Tải các Model AI
  async function init() {
    try {
      await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
      await faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL);
      await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
      statusDiv.innerText = "AI đã sẵn sàng! Đang mở camera sau...";
      startCamera();
    } catch (err) {
      statusDiv.innerText = "Lỗi tải Model AI: " + err.message;
      console.error(err);
    }
  }

  // Mở Camera Sau (Environment)
  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => {
        video.srcObject = stream;
        statusDiv.innerText = "Căn chỉnh mặt vào khung hình và ấn nút.";
        btnRegister.disabled = false;
      })
      .catch(err => {
        statusDiv.innerText = "Không truy cập được camera sau. Thử lại hoặc cấp quyền.";
      });
  }

  // Xử lý sự kiện bấm nút Đăng ký
  btnRegister.addEventListener('click', async () => {
    const mssv = document.getElementById('mssv').value.trim();
    const hoten = document.getElementById('hoten').value.trim();
    const lop = document.getElementById('lop').value.trim();

    if (!mssv || !hoten || !lop) {
      alert("Vui lòng điền đầy đủ thông tin!");
      return;
    }

    statusDiv.innerText = "Đang quét khuôn mặt...";
    btnRegister.disabled = true;

    // Trích xuất vector
    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    
    if (!detection) {
      statusDiv.innerText = "Không tìm thấy khuôn mặt! Hãy thử lại.";
      btnRegister.disabled = false;
      return;
    }

    statusDiv.innerText = "Tìm thấy khuôn mặt! Đang gửi lên dữ liệu...";
    
    // Convert mảng vector thành chuỗi String JSON để gửi sang Sheet
    const faceVectorString = JSON.stringify(Array.from(detection.descriptor));

    const payload = {
      action: "register",
      mssv: mssv,
      hoten: hoten,
      lop: lop,
      faceVector: faceVectorString
    };

    // Gửi sang GAS bằng phương thức POST
    fetch(GAS_API, {
      method: "POST",
      mode: "no-cors", // Tránh lỗi CORS từ Google Apps Script
      body: JSON.stringify(payload)
    })
    .then(() => {
      statusDiv.innerText = `Đăng ký thành công học sinh: ${hoten}!`;
      document.getElementById('mssv').value = "";
      document.getElementById('hoten').value = "";
      btnRegister.disabled = false;
    })
    .catch(err => {
      statusDiv.innerText = "Lỗi khi gửi dữ liệu lên Google Sheets.";
      btnRegister.disabled = false;
    });
  });

  window.onload = init;
</script>
</body>
</html>
