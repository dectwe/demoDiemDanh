<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Điểm Danh - Quét Khuôn Mặt</title>
  
  <script src="face-api-local.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
    h2 { color: #333; }
    .video-container { position: relative; width: 320px; height: 240px; margin: 20px auto; background: #000; border-radius: 10px; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #status { margin: 15px auto; max-width: 400px; font-weight: bold; color: #555; font-size: 16px; line-height: 1.5; }
    .alert-box { padding: 15px; border: 1px dashed red; background: #fff5f5; border-radius: 5px; text-align: left; }
    a { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <h2>📸 Hệ Thống Điểm Danh AI</h2>
  <div id="status">Đang khởi tạo hệ thống mạng AI...</div>

  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <p><a href="register.html">👉 Chuyển sang trang Đăng ký khuôn mặt mới</a></p>

  <script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    
    // Giữ nguyên link GAS API của bạn
    const GAS_API = "https://script.google.com/macros/s/AKfycbz5PqDeWM_GxZaoecHDO_k7JiT4RNpOIP7UsTiQ1Cwar34b9y9w57bxbK23Ssd2BlK5/exec";
    const MODEL_URL = "./face-api.js-master/weights/";
    let faceMatcher = null;

      // --- CƠ CHẾ KHÓA CHỐNG TRÙNG LẶP NÂNG CAO ---
    let isProcessing = false;           // Khóa vạn năng: Bật khi AI đang phân tích HOẶC đang gửi mạng
    const attendanceRegistry = {};     // Bản đồ lưu mốc thời gian khóa từng người
    const COOLDOWN_TIME = 30000;        // Tăng thời gian khóa lên 30 giây cho chắc chắn không bị spam

    async function init() {
      startCamera();

      if (typeof faceapi === 'undefined') {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi: Trình duyệt chưa kích hoạt được thư viện face-api local.";
        return;
      }

      try {
        statusDiv.style.color = "#555";
        statusDiv.innerText = "Đang tải các cấu trúc mạng AI từ thư mục Local...";
        
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        statusDiv.style.color = "blue";
        statusDiv.innerText = "Mạng AI đã nạp! Đang đồng bộ danh sách học sinh từ Google Sheets...";
        
        await loadStudentsData();
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi nạp mạng AI: " + error.message;
        console.error(error);
      }
    }

    async function loadStudentsData() {
      try {
        const response = await fetch(`${GAS_API}?action=get_faces`);
        const result = await response.json();
        
        if (result.status === "success" && result.data.length > 0) {
          const labeledDescriptors = result.data.map(item => {
            const descriptors = item.descriptors.map(d => new Float32Array(d));
            return new faceapi.LabeledFaceDescriptors(item.name, descriptors);
          });
          
          faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
          statusDiv.style.color = "green";
          statusDiv.innerText = "🤖 Hệ thống AI sẵn sàng! Mời học sinh đứng trước camera để điểm danh.";
        } else {
          statusDiv.style.color = "orange";
          statusDiv.innerText = "Chưa có dữ liệu học sinh. Vui lòng đăng ký trước!";
        }
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Không thể kết nối dữ liệu Sheet: " + error.message;
      }
    }

    function startCamera() {
      const constraints = {
        audio: false,
        video: { facingMode: "user", width: 320, height: 240 }
      };

      navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
          video.srcObject = stream;
          // Quét liên tục mỗi 1.5 giây để đảm bảo nhạy nhưng không quá dày đặc
          setInterval(recognizeFace, 1500); 
        })
        .catch(err => {
          statusDiv.style.color = "red";
          statusDiv.innerText = "Lỗi Camera: " + err.message;
        });
    }

    async function recognizeFace() {
      // Nếu hệ thống đang bận xử lý (quét mặt/gửi mạng) thì hủy ngay lượt quét này để tránh chồng chéo luồng
      if (!faceMatcher || isProcessing) return;
      
      // Kích hoạt khóa vạn năng ngay lập tức khi bắt đầu quét
      isProcessing = true; 

      try {
        const detection = await faceapi.detectSingleFace(video)
          .withFaceLandmarks()
          .withFaceDescriptor();
          
        if (detection) {
          const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
          const recognizedName = bestMatch.label;

          if (recognizedName !== 'unknown') {
            const now = Date.now();
            const lastCheckedTime = attendanceRegistry[recognizedName] || 0;

            // KIỂM TRA COOLDOWN: Nếu người này vừa quét chưa quá 30 giây
            if ((now - lastCheckedTime) < COOLDOWN_TIME) {
              const timeLeft = Math.ceil((COOLDOWN_TIME - (now - lastCheckedTime)) / 1000);
              statusDiv.style.color = "purple";
              statusDiv.innerText = `⏳ [Chờ] ${recognizedName} đã điểm danh. Vui lòng đợi ${timeLeft}s.`;
              
              // Mở khóa vạn năng vì lượt này chỉ là thông báo chờ, không gửi mạng
              isProcessing = false; 
              return; 
            }

            // Cập nhật mốc thời gian khóa người này tại Frontend ngay lập tức
            attendanceRegistry[recognizedName] = now;

            statusDiv.style.color = "blue";
            statusDiv.innerText = `🎉 Nhận diện: ${recognizedName}! Đang ghi nhận lên Google Sheets...`;
            
            // Tiến hành gửi mạng và ĐỢI cho đến khi kết thúc hoàn toàn
            await sendAttendance(recognizedName);
          } else {
            statusDiv.style.color = "orange";
            statusDiv.innerText = "⚠️ Khuôn mặt chưa rõ nét hoặc không khớp danh sách!";
            // Mở khóa để lượt sau quét tiếp
            isProcessing = false; 
          }
        } else {
          // Không thấy khuôn mặt nào trước cam, mở khóa cho lượt sau
          isProcessing = false; 
        }
      } catch (err) {
        console.error("Lỗi trong quá trình nhận diện:", err);
        isProcessing = false; // Đảm bảo luôn mở khóa nếu code gặp crash ngầm
      }
    }

    async function sendAttendance(nameToSend) {
      try {
        const response = await fetch(GAS_API, {
          method: 'POST',
          headers: { 
            'Content-Type': 'text/plain;charset=utf-8' 
          },
          body: JSON.stringify({ action: 'checkin', name: nameToSend })
        });
        
        const result = await response.json();
        
        if (result.status === "success") {
          statusDiv.style.color = "green";
          statusDiv.innerText = `✅ ĐÃ ĐIỂM DANH THÀNH CÔNG: ${nameToSend}`;
        } else {
          statusDiv.style.color = "red";
          statusDiv.innerText = `❌ Lỗi từ Sheet: ` + result.message;
        }
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi đường truyền mạng: " + error.message;
      } finally {
        // CHỈ mở khóa vạn năng sau khi Google Sheets đã xử lý xong và phản hồi mạng thành công!
        isProcessing = false;
      }
    }

    window.onload = init;
  </script>
</body>
</html>
