<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Điểm Danh - Đăng Ký Khuôn Mặt</title>
  
  <!-- Nhúng thư viện face-api chuẩn trước -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.clean.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
    h2 { color: #333; }
    .video-container { position: relative; width: 320px; height: 240px; margin: 20px auto; background: #000; border-radius: 10px; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    #status { margin: 15px auto; max-width: 400px; font-weight: bold; color: #555; font-size: 16px; line-height: 1.5; }
    .alert-box { padding: 15px; border: 1px dashed red; background: #fff5f5; border-radius: 5px; text-align: left; }
    input[type="text"] { padding: 10px; width: 200px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
    button { padding: 10px 20px; font-size: 16px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    a { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <h2>👤 Đăng Ký Khuôn Mặt Học Sinh</h2>
  <div id="status">Đang tải cấu trúc mạng AI từ Cloud...</div>

  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <div>
    <input type="text" id="studentName" placeholder="Nhập Họ và Tên học sinh..." disabled><br>
    <button id="regBtn" onclick="registerFace()" disabled>📸 Chụp & Đăng Ký</button>
  </div>

  <p><a href="index.html">⬅️ Quay lại trang Điểm danh</a></p>

  <script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    const studentNameInput = document.getElementById('studentName');
    const regBtn = document.getElementById('regBtn');
    
    // -----------------------------------------------------------------
    // CẤU HÌNH: Dán đường dẫn Web App Google Apps Script (/exec) của bạn vào đây
    const GAS_API = "DÁN_LINK_WEB_APP_APPS_SCRIPT_CỦA_BẠN_Ở_ĐÂY";
    // -----------------------------------------------------------------
    
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/cgarciagl/face-api.js@master/weights/';

    async function init() {
      try {
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        statusDiv.innerText = "Mạng AI đã nạp xong. Đang kích hoạt camera...";
        startCamera();
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi khởi tạo AI: " + error.message;
      }
    }

    function startCamera() {
      const constraints = {
        audio: false,
        video: { facingMode: "environment", width: 320, height: 240 } // Dùng camera sau để giáo viên dễ quét mặt học sinh
      };

      navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
          video.srcObject = stream;
          video.play().catch(e => console.error("Lỗi tự động phát video:", e));
          
          statusDiv.style.color = "green";
          statusDiv.innerText = "Camera đã sẵn sàng! Mời nhập tên và chụp hình khuôn mặt.";
          studentNameInput.disabled = false;
          regBtn.disabled = false;
        })
        .catch(err => {
          statusDiv.style.color = "red";
          if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
            statusDiv.innerHTML = `
              <div class="alert-box">
                <p>⚠️ <strong>Ứng dụng chưa được cấp quyền mở Camera!</strong></p>
                <p style="font-size: 14px; color: #555; margin:0;">
                  <strong>Cách sửa:</strong> Bấm vào <strong>icon ổ khóa 🔒</strong> (hoặc chữ <strong>aA</strong>) trên thanh địa chỉ ➔ Tìm mục <strong>Quyền/Cài đặt trang web</strong> ➔ Bật <strong>Cho phép Camera</strong>, sau đó F5 tải lại trang.
                </p>
              </div>`;
          } else {
            statusDiv.innerText = "Lỗi thiết bị Camera: " + err.message;
          }
        });
    }

    async function registerFace() {
      const name = studentNameInput.value.trim();
      if (!name) {
        alert("Vui lòng nhập họ tên học sinh trước khi chụp!");
        return;
      }

      regBtn.disabled = true;
      statusDiv.style.color = "#555";
      statusDiv.innerText = "Đang phân tích khuôn mặt... Giữ yên camera.";

      const detection = await faceapi.detectSingleFace(video)
        .withFaceLandmarks()
        .withFaceDescriptor();

      if (!detection) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "❌ Không tìm thấy khuôn mặt trong khung hình! Thử lại.";
        regBtn.disabled = false;
        return;
      }

      statusDiv.innerText = "Đang tải dữ liệu khuôn mặt lên bộ nhớ Google Sheets...";
      
      // Chuyển mảng mã hóa vector sang mảng số thông thường để gửi JSON
      const descriptorArray = Array.from(detection.descriptor);

      try {
        const response = await fetch(GAS_API, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'register',
            name: name,
            descriptor: descriptorArray
          })
        });

        statusDiv.style.color = "green";
        statusDiv.innerText = `✅ Đăng ký thành công dữ liệu cho: ${name}`;
        studentNameInput.value = "";
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi đồng bộ dữ liệu: " + error.message;
      } finally {
        regBtn.disabled = false;
      }
    }

    window.onload = init;
  </script>
</body>
</html>
