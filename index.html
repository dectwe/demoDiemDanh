<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Điểm Danh - Quét Khuôn Mặt</title>
  
  <script src="face-api-local.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
    h2 { color: #333; }
    .video-container { position: relative; width: 320px; height: 240px; margin: 20px auto; background: #000; border-radius: 10px; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #status { margin: 15px auto; max-width: 400px; font-weight: bold; color: #555; font-size: 16px; line-height: 1.5; }
    .alert-box { padding: 15px; border: 1px dashed red; background: #fff5f5; border-radius: 5px; text-align: left; }
    a { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; font-weight: bold; }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <h2>🤖 Hệ Thống AI Điểm Danh Học Sinh</h2>
  <div id="status">Đang khởi tạo cấu trúc mạng AI...</div>

  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <p><a href="register.html">👤 Đi tới trang Đăng ký Khuôn mặt ➔</a></p>

  <script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    
    // Giữ nguyên đường dẫn GAS API chuẩn của bạn
    const GAS_API = "https://script.google.com/macros/s/AKfycbz5PqDeWM_GxZaoecHDO_k7JiT4RNpOIP7UsTiQ1Cwar34b9y9w57bxbK23Ssd2BlK5/exec";
    const MODEL_URL = "./face-api.js-master/weights/";
    let faceMatcher = null;

    // --- CƠ CHẾ KHÓA CHỐNG TRÙNG LẶP NÂNG CAO ---
    let isProcessing = false;           // Khóa vạn năng: Bật khi AI đang phân tích hình ảnh HOẶC đang gửi mạng
    const attendanceRegistry = {};     // Bản đồ lưu mốc thời gian khóa riêng cho từng học sinh
    const COOLDOWN_TIME = 30000;        // Thời gian khóa (30 giây) giúp tránh spam khi đứng lâu trước cam

    async function init() {
      startCamera();

      if (typeof faceapi === 'undefined') {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi: Trình duyệt chưa kích hoạt được thư viện face-api local.";
        return;
      }

      try {
        statusDiv.style.color = "#555";
        statusDiv.innerText = "Đang tải các cấu trúc mạng AI từ thư mục Local...";
        
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        statusDiv.style.color = "blue";
        statusDiv.innerText = "Mạng AI đã nạp! Đang đồng bộ danh sách khuôn mặt từ Google Sheets...";
        
        await loadStudentsData();
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi nạp mạng AI: " + error.message;
        console.error("Chi tiết lỗi nạp model:", error);
      }
    }

    async function loadStudentsData() {
      try {
        const response = await fetch(`${GAS_API}?action=get_faces`);
        const result = await response.json();
        
        if (result.status === "success" && result.data.length > 0) {
          const labeledDescriptors = result.data.map(item => {
            const descriptors = item.descriptors.map(d => new Float32Array(d));
            return new faceapi.LabeledFaceDescriptors(item.name, descriptors);
          });
          
          // Siết chặt Threshold từ 0.6 xuống 0.42 để chống nhận diện nhầm chỏm tóc hoặc góc nghiêng nhiễu
          faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.42);
          statusDiv.style.color = "green";
          statusDiv.innerText = "🤖 Hệ thống AI đã sẵn sàng! Mời học sinh nhìn thẳng vào camera để điểm danh.";
        } else {
          statusDiv.style.color = "orange";
          statusDiv.innerText = "Chưa có dữ liệu học sinh nào trong Sheets. Vui lòng qua trang đăng ký trước!";
        }
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Không thể kết nối dữ liệu Sheet: " + error.message;
      }
    }

    function startCamera() {
      const constraints = {
        audio: false,
        video: { facingMode: "user", width: 320, height: 240 }
      };

      navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
          video.srcObject = stream;
          // Quét liên tục mỗi 1.5 giây để đảm bảo nhận diện nhạy nhưng không gây quá tải cho CPU
          setInterval(recognizeFace, 1500); 
        })
        .catch(err => {
          statusDiv.style.color = "red";
          if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
            statusDiv.innerHTML = `
              <div class="alert-box">
                <p>⚠️ <strong>Chưa cấp quyền Camera!</strong></p>
                <p style="font-size: 14px; color: #555; margin:0;">
                  <strong>Cách sửa:</strong> Bấm vào <strong>icon ổ khóa 🔒</strong> trên thanh địa chỉ ➔ Chọn <strong>Cho phép Camera</strong>, sau đó tải lại trang.
                </p>
              </div>`;
          } else {
            statusDiv.innerText = "Lỗi Camera: " + err.message;
          }
        });
    }

    async function recognizeFace() {
      // Nếu AI chưa sẵn sàng hoặc hệ thống đang bận xử lý (quét mặt/gửi mạng) thì lập tức hủy lượt quét này
      if (!faceMatcher || isProcessing) return;
      
      // Kích hoạt khóa vạn năng ngay lập tức khi bắt đầu quy trình
      isProcessing = true; 

      try {
        const detection = await faceapi.detectSingleFace(video)
          .withFaceLandmarks()
          .withFaceDescriptor();
          
        if (detection) {
          const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
          const recognizedName = bestMatch.label;
          const matchDistance = bestMatch.distance; // Lấy khoảng cách sai lệch Euclidean

          // CHỈ chấp nhận khi khớp tên học sinh VÀ độ sai lệch phải cực kỳ thấp (<= 0.42)
          if (recognizedName !== 'unknown' && matchDistance <= 0.42) {
            const now = Date.now();
            const lastCheckedTime = attendanceRegistry[recognizedName] || 0;

            // KIỂM TRA COOLDOWN ĐỘC LẬP: Nếu học sinh này vừa quét chưa quá 30 giây
            if ((now - lastCheckedTime) < COOLDOWN_TIME) {
              const timeLeft = Math.ceil((COOLDOWN_TIME - (now - lastCheckedTime)) / 1000);
              statusDiv.style.color = "purple";
              statusDiv.innerText = `⏳ [Chờ] ${recognizedName} đã điểm danh. Vui lòng đợi ${timeLeft}s.`;
              
              // Mở khóa vạn năng để đón lượt quét tiếp theo của người khác, không gửi mạng
              isProcessing = false; 
              return; 
            }

            // Cập nhật mốc thời gian khóa học sinh này tại Frontend ngay trước khi gọi fetch mạng
            attendanceRegistry[recognizedName] = now;

            // Tính toán tỷ lệ phần trăm chính xác dựa trên khoảng cách
            const accuracyPercent = Math.round((1 - matchDistance) * 100);
            statusDiv.style.color = "blue";
            statusDiv.innerText = `🎉 Nhận diện chuẩn: ${recognizedName} (${accuracyPercent}%)! Đang ghi nhận lên Sheets...`;
            
            // Tiến hành gửi mạng lên Google và ĐỢI kết quả hoàn toàn bằng await
            await sendAttendance(recognizedName);
          } else {
            // Lọt vào đây nếu chỉ thấy chỏm tóc, vật thể lạ hoặc góc mặt quá nghiêng nhiễu (distance > 0.42)
            statusDiv.style.color = "orange";
            statusDiv.innerText = "⚠️ Đang quét... Hãy nhìn thẳng vào camera để điểm danh!";
            isProcessing = false; 
          }
        } else {
          // Không phát hiện khuôn mặt nào trong khung hình
          isProcessing = false; 
        }
      } catch (err) {
        console.error("Lỗi trong quá trình nhận diện AI:", err);
        isProcessing = false; // Đảm bảo luôn giải phóng luồng nếu code gặp lỗi crash ngầm
      }
    }

    async function sendAttendance(nameToSend) {
      try {
        const response = await fetch(GAS_API, {
          method: 'POST',
          headers: { 
            'Content-Type': 'text/plain;charset=utf-8' 
          },
          body: JSON.stringify({ action: 'checkin', name: nameToSend })
        });
        
        const result = await response.json();
        
        if (result.status === "success") {
          statusDiv.style.color = "green";
          statusDiv.innerText = `✅ ĐÃ ĐIỂM DANH THÀNH CÔNG: ${nameToSend}`;
        } else {
          statusDiv.style.color = "red";
          statusDiv.innerText = `❌ Lỗi từ Google Sheet: ` + result.message;
        }
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi kết nối mạng: " + error.message;
        console.error("Chi tiết lỗi gửi điểm danh:", error);
      } finally {
        // CHỈ mở khóa vạn năng sau khi Google Sheets phản hồi kết quả mạng xong xuôi!
        isProcessing = false;
      }
    }

    window.onload = init;

  </script>
</body>
</html>
