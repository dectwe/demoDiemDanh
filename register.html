<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Điểm Danh - Đăng Ký Khuôn Mặt</title>
  
  <script src="face-api-local.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
    h2 { color: #333; }
    .video-container { position: relative; width: 320px; height: 240px; margin: 20px auto; background: #000; border-radius: 10px; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    #status { margin: 15px auto; max-width: 400px; font-weight: bold; color: #555; font-size: 16px; line-height: 1.5; }
    .alert-box { padding: 15px; border: 1px dashed red; background: #fff5f5; border-radius: 5px; text-align: left; }
    input[type="text"] { padding: 10px; width: 200px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
    button { padding: 10px 20px; font-size: 16px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    a { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <h2>👤 Đăng Ký Khuôn Mặt Học Sinh</h2>
  <div id="status">Đang tải cấu trúc mạng AI...</div>

  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <div>
    <input type="text" id="studentName" placeholder="Nhập Họ và Tên học sinh..." disabled><br>
    <button id="regBtn" onclick="registerFace()" disabled>📸 Chụp & Đăng Ký</button>
  </div>

  <p><a href="index.html">⬅️ Quay lại trang Điểm danh</a></p>

  <script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    const studentNameInput = document.getElementById('studentName');
    const regBtn = document.getElementById('regBtn');
    
    const GAS_API = "https://script.google.com/macros/s/AKfycbzYeFb2w_0Jn-s1SR1FCatFKo4MUC4Mn3R6D21iT4Lv-N69jSxnHMY8_eI4EIqiOZ-m/exec";
    // Lấy trực tiếp tên miền hiện tại để ghép đường dẫn chuẩn xác nhất
const MODEL_URL = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + '/face-api.js-master/weights/';

    async function init() {
      startCamera();

      if (typeof faceapi === 'undefined') {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi: Trình duyệt chưa kích hoạt được thư viện face-api local!";
        return;
      }

      try {
        statusDiv.style.color = "#555";
        statusDiv.innerText = "Đang tải các cấu trúc mạng AI từ thư mục Local...";
        
        // Cập nhật từ loadFromDisk sang loadFromUri chuẩn Web Browser
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        statusDiv.style.color = "green";
        statusDiv.innerText = "Mạng AI đã sẵn sàng! Mời nhập tên và chụp hình khuôn mặt.";
        studentNameInput.disabled = false;
        regBtn.disabled = false;
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi nạp mạng AI: " + error.message;
        console.error(error);
      }
    }

    function startCamera() {
      const constraints = { audio: false, video: { facingMode: "environment", width: 320, height: 240 } };
      navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
          video.srcObject = stream;
        })
        .catch(err => {
          statusDiv.style.color = "red";
          if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
            statusDiv.innerHTML = `
              <div class="alert-box">
                <p>⚠️ <strong>Chưa cấp quyền Camera!</strong></p>
                <p style="font-size: 14px; color: #555; margin:0;">
                  <strong>Cách sửa:</strong> Bấm vào <strong>icon ổ khóa 🔒</strong> trên thanh địa chỉ ➔ Chọn <strong>Cho phép Camera</strong>.
                </p>
              </div>`;
          } else {
            statusDiv.innerText = "Lỗi Camera: " + err.message;
          }
        });
    }

    async function registerFace() {
      const name = studentNameInput.value.trim();
      if (!name) {
        alert("Vui lòng nhập họ tên học sinh trước khi chụp!");
        return;
      }

      regBtn.disabled = true;
      statusDiv.style.color = "#555";
      statusDiv.innerText = "Đang phân tích khuôn mặt... Giữ yên camera.";

      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

      if (!detection) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "❌ Không tìm thấy khuôn mặt! Hãy căn chỉnh lại góc và thử lại.";
        regBtn.disabled = false;
        return;
      }

      statusDiv.innerText = "Đang tải dữ liệu khuôn mặt lên bộ nhớ Google Sheets...";
      const descriptorArray = Array.from(detection.descriptor);

      try {
        const response = await fetch(GAS_API, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8' 
          },
          body: JSON.stringify({
            action: 'register',
            name: name,
            descriptor: descriptorArray
          })
        });

        // ĐỌC PHẢN HỒI THỰC TẾ TỪ GOOGLE APPS SCRIPT
        const result = await response.json(); 

        if (result.status === "success") {
          statusDiv.style.color = "green";
          statusDiv.innerText = `✅ Đăng ký THÀNH CÔNG dữ liệu cho: ${name}`;
          studentNameInput.value = "";
        } else {
          // Nếu Google Apps Script trả về lỗi, nó sẽ hiển thị ở đây
          statusDiv.style.color = "red";
          statusDiv.innerText = `❌ Lỗi từ Google Sheet: ${result.message}`;
        }
      } catch (error) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Lỗi đồng bộ (Network): " + error.message;
        console.error(error);
      } finally {
        regBtn.disabled = false;
      }

    window.onload = init;
  </script>
</body>
</html>
